name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint & test (py3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # iptables/ipset are the only system dependencies the test-suite probes
      # (via shutil.which / dpkg in the site-diagnostics tests). Installing them
      # keeps the whole pytest suite green on a clean runner without excluding
      # any tests. iptables is preinstalled on ubuntu-latest; ipset is not.
      - name: Install system dependencies (firewall tooling for tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y iptables ipset

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint + import order)
        run: ruff check .

      - name: Pytest (unit tests)
        # Hard gate: a failure here fails the build.
        run: pytest tests/ -q

      # Advisory security scan. The current codebase has a handful of
      # medium/high findings (bind-all addresses, md5 used for a non-security
      # multipart boundary, urlopen to trusted APIs, tar extraction of the
      # panel's own backups) that live in application logic. They are surfaced
      # here for review but do not block the build.
      - name: Bandit (security scan, advisory)
        continue-on-error: true
        run: |
          bandit -r . -ll \
            --exclude ./venv,./.venv,./env,./ENV,./tests,./static,./templates,./instance,./logs,./ips,./ip_blocked,./data,./runtime_backups,./build,./dist
