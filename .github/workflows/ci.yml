name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint & test (py3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # iptables/ipset are the only system dependencies the test-suite probes
      # (via shutil.which / dpkg in the site-diagnostics tests). Installing them
      # keeps the whole pytest suite green on a clean runner without excluding
      # any tests. iptables is preinstalled on ubuntu-latest; ipset is not.
      - name: Install system dependencies (firewall tooling, shellcheck)
        run: |
          sudo apt-get update
          sudo apt-get install -y iptables ipset shellcheck

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: pip check (dependency consistency)
        run: pip check

      # Advisory: known CVEs in pinned Flask/Pillow/Werkzeug are tracked here
      # until dependency bumps are reviewed separately.
      - name: pip-audit (dependency vulnerabilities, advisory)
        continue-on-error: true
        run: pip-audit -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/js/package.json

      - name: Install Node dependencies (ESLint)
        working-directory: tools/js
        run: npm install

      - name: JavaScript syntax check (node --check)
        run: |
          find static tg_mini ip_blocked -name '*.js' -print0 \
            | sort -z \
            | xargs -0 -r -n1 node --check

      - name: ESLint (JavaScript)
        working-directory: tools/js
        run: npm run lint:js

      - name: Ruff (lint + import order)
        run: ruff check . --config tools/python/ruff.toml

      - name: Shell scripts (syntax + shellcheck)
        run: bash tests/test_script_sh_all.sh

      - name: Pytest (unit tests)
        # Hard gate: a failure here fails the build.
        run: pytest tests/ -q

      # Advisory security scan. The current codebase has a handful of
      # medium/high findings (bind-all addresses, md5 used for a non-security
      # multipart boundary, urlopen to trusted APIs, tar extraction of the
      # panel's own backups) that live in application logic. They are surfaced
      # here for review but do not block the build.
      - name: Bandit (security scan, advisory)
        continue-on-error: true
        run: |
          bandit -r . -ll \
            --exclude ./venv,./.venv,./env,./ENV,./tests,./static,./templates,./instance,./logs,./ips,./ip_blocked,./data,./runtime_backups,./build,./dist
