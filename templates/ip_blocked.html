<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ ограничен</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/styles_mobile.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--theme-blocked-bg-start, #1a1a2e) 0%, var(--theme-blocked-bg-end, #16213e) 100%);
            color: var(--theme-text-main, #fff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 80%, var(--theme-primary-alpha-10, rgba(76, 175, 80, 0.1)) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, var(--theme-danger-alpha-10, rgba(244, 67, 54, 0.1)) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, var(--theme-chart-grid-soft, rgba(33, 150, 243, 0.05)) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--theme-blocked-surface, rgba(30, 30, 46, 0.8));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow:
                0 20px 40px var(--theme-black-alpha-30, rgba(0, 0, 0, 0.3)),
                0 0 0 1px var(--theme-glass-border, rgba(255, 255, 255, 0.1));
            border: 1px solid var(--theme-glass-border, rgba(255, 255, 255, 0.1));
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--theme-danger, #f44336), var(--theme-warning, #ff9800), var(--theme-primary, #4caf50));
        }

        .lock-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s infinite;
            filter: drop-shadow(0 0 10px var(--theme-danger-toast-bg, rgba(244, 67, 54, 0.5)));
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--theme-danger, #f44336), var(--theme-warning, #ff9800));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 10px var(--theme-danger-alpha-10, rgba(244, 67, 54, 0.3));
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--theme-text-dim, #aaa);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .info-box {
            background: var(--theme-chart-grid-soft, rgba(255, 255, 255, 0.05));
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            border: 1px solid var(--theme-glass-border, rgba(255, 255, 255, 0.1));
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--theme-chart-grid-soft, rgba(255, 255, 255, 0.05));
        }

        .info-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .info-label {
            color: var(--theme-text-muted, #888);
            font-weight: 500;
        }

        .info-value {
            color: var(--theme-primary, #4caf50);
            font-family: 'Monaco', 'Menlo', monospace;
            font-weight: 600;
        }

        .ip-address {
            background: var(--theme-primary-alpha-10, rgba(76, 175, 80, 0.1));
            border: 2px solid var(--theme-primary-alpha-30, rgba(76, 175, 80, 0.3));
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: var(--theme-primary, #4caf50);
            font-weight: 600;
        }

        .action-box {
            background: var(--theme-secondary-alpha-10, rgba(33, 150, 243, 0.1));
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            border: 1px solid var(--theme-secondary-alpha-30, rgba(33, 150, 243, 0.2));
        }

        .action-title {
            color: var(--theme-secondary, #2196f3);
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .action-text {
            color: var(--theme-text-dim, #aaa);
            line-height: 1.5;
        }

        .contact-info {
            background: var(--theme-warning-alpha-10, rgba(255, 193, 7, 0.1));
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            border: 1px solid var(--theme-warning-alpha-20, rgba(255, 193, 7, 0.2));
        }

        .contact-title {
            color: var(--theme-warning-bright, #ffc107);
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .instructions {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--theme-glass-border, rgba(255, 255, 255, 0.1));
        }

        .instructions h3 {
            color: var(--theme-text-muted, #888);
            font-size: 1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .steps {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }

        .step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            color: var(--theme-text-dim, #aaa);
        }

        .step-number {
            background: var(--theme-primary-alpha-20, rgba(76, 175, 80, 0.2));
            color: var(--theme-primary, #4caf50);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .footer {
            margin-top: 30px;
            color: var(--theme-text-subtle, #666);
            font-size: 0.9rem;
            border-top: 1px solid var(--theme-chart-grid-soft, rgba(255, 255, 255, 0.05));
            padding-top: 20px;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px var(--theme-danger-toast-bg, rgba(244, 67, 54, 0.5)));
            }

            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 15px var(--theme-danger-toast-bg, rgba(244, 67, 54, 0.7)));
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeIn 0.5s ease-out;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2rem;
            }

            .lock-icon {
                font-size: 60px;
            }

            .info-row {
                flex-direction: column;
                gap: 5px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .lock-icon {
                font-size: 50px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 16px;
                border-radius: 14px;
            }

            .ip-address {
                font-size: 1.06rem;
                letter-spacing: 0.4px;
                padding: 12px;
            }
        }

        @media (min-width: 1600px) {
            .container {
                max-width: 760px;
                padding: 48px;
            }

            h1 {
                font-size: 2.8rem;
            }

            .subtitle {
                font-size: 1.28rem;
            }
        }

        /* Эффект частиц (опционально) */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -2;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: var(--theme-glass-border, rgba(255, 255, 255, 0.1));
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            max-width: min(92vw, 420px);
            padding: 0.9rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--theme-glass-border, rgba(255, 255, 255, 0.2));
            color: var(--theme-text-main, #fff);
            background: var(--theme-blocked-surface, rgba(30, 30, 46, 0.92));
            box-shadow: 0 14px 28px var(--theme-black-alpha-30, rgba(0, 0, 0, 0.3));
            backdrop-filter: blur(8px);
            z-index: 1200;
            animation: popup-toast-in 220ms cubic-bezier(0.2, 0.75, 0.22, 1);
            transform-origin: top right;
        }

        .notification-success {
            border-left: 4px solid var(--theme-primary, #4caf50);
        }

        .notification-info {
            border-left: 4px solid var(--theme-secondary, #2196f3);
        }

        .notification-warning {
            border-left: 4px solid var(--theme-warning, #ff9800);
        }

        .notification-error {
            border-left: 4px solid var(--theme-danger, #f44336);
        }

        @keyframes popup-toast-in {
            from {
                opacity: 0;
                transform: translate3d(18px, -14px, 0) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
            }
        }

        @keyframes popup-toast-out {
            from {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
            }

            to {
                opacity: 0;
                transform: translate3d(14px, -10px, 0) scale(0.98);
            }
        }

        .notification.notification-exit {
            animation: popup-toast-out 170ms ease forwards;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
            }

            100% {
                transform: translateY(-100vh) rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <script id="blocked-flash-messages" type="application/json">
        {{ get_flashed_messages(with_categories=True) | tojson }}
    </script>

    <!-- Эффект частиц -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="lock-icon">🔒</div>
        <h1>Доступ ограничен</h1>
        <p class="subtitle">Ваш IP-адрес не входит в список разрешенных для доступа к этой системе</p>

        <div class="ip-address" id="ipDisplay">
            {{ client_ip }}
        </div>

        <div class="info-box">
            <div class="info-row">
                <span class="info-label">IP-адрес:</span>
                <span class="info-value">{{ client_ip }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Время:</span>
                <span class="info-value">{{ current_time }}</span>
            </div>
        </div>

        <script>
            // Создаем эффект частиц
            function createParticles() {
                const particlesContainer = document.getElementById('particles');
                const particleCount = 30;

                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';

                    // Случайные параметры
                    const size = Math.random() * 5 + 2;
                    const left = Math.random() * 100;
                    const delay = Math.random() * 20;
                    const duration = Math.random() * 10 + 20;

                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.left = `${left}%`;
                    particle.style.animationDelay = `${delay}s`;
                    particle.style.animationDuration = `${duration}s`;

                    particlesContainer.appendChild(particle);
                }
            }

            // Плавное отображение IP
            function animateIp() {
                const ipElement = document.getElementById('ipDisplay');
                const ip = ipElement.textContent;
                ipElement.textContent = '';

                let i = 0;
                function typeWriter() {
                    if (i < ip.length) {
                        ipElement.textContent += ip.charAt(i);
                        i++;
                        setTimeout(typeWriter, 50);
                    }
                }

                setTimeout(typeWriter, 500);
            }

            function showFlashes() {
                const payloadEl = document.getElementById('blocked-flash-messages');
                if (!payloadEl) return;

                let flashes = [];
                try {
                    flashes = JSON.parse(payloadEl.textContent || '[]');
                } catch (_e) {
                    flashes = [];
                }

                const normalizeType = (rawCategory) => {
                    const category = String(rawCategory || 'info').toLowerCase();
                    if (['error', 'danger'].includes(category)) return 'error';
                    if (['success', 'ok'].includes(category)) return 'success';
                    if (['warning', 'warn'].includes(category)) return 'warning';
                    return 'info';
                };

                const showToast = (message, type, delayMs) => {
                    setTimeout(() => {
                        const toast = document.createElement('div');
                        toast.className = `notification notification-${type}`;
                        toast.textContent = message;
                        toast.setAttribute('role', type === 'error' ? 'alert' : 'status');
                        toast.setAttribute('aria-live', type === 'error' ? 'assertive' : 'polite');
                        toast.setAttribute('aria-atomic', 'true');
                        document.body.appendChild(toast);

                        setTimeout(() => {
                            toast.classList.add('notification-exit');
                            setTimeout(() => {
                                toast.remove();
                            }, 200);
                        }, 4200);
                    }, delayMs);
                };

                flashes.forEach((entry, index) => {
                    const category = Array.isArray(entry) ? entry[0] : 'info';
                    const message = Array.isArray(entry) ? entry[1] : String(entry || '');
                    if (!message) return;
                    showToast(message, normalizeType(category), index * 600);
                });
            }

            // Инициализация
            document.addEventListener('DOMContentLoaded', () => {
                createParticles();
                animateIp();
                showFlashes();
            });
        </script>
</body>

</html>
