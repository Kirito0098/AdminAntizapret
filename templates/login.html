<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--=============== REMIXICONS ===============-->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet" />

  <!--=============== CSS ===============-->
  <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/theme.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/login_styles.css') }}" />

  <title>Админпанель Claymore</title>
  <link rel="icon" href="/static/assets/img/favicon.ico" type="image/x-icon" />
</head>

<body>
  <div id="notification" class="notification" style="display: none" role="status" aria-live="polite" aria-atomic="true">
  </div>
  <div class="login">
    <img src="{{ url_for('static', filename='assets/img/login-bg.png') }}" alt="Фоновое изображение входа"
      class="login__img" />

    <script id="flash-messages" type="application/json">
        {{ get_flashed_messages(with_categories=True) | tojson }}
      </script>

    <!-- Удален блок flash-messages -->
    <!--
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div id="flash-container" class="flash-messages">
            {% for message in messages %}
            <div class="flash-message">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        -->

    <form action="{{ url_for('login') }}" method="POST" class="login__form" autocomplete="on"
      data-attempts="{{ session.get('attempts', 0) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <h1 class="login__title">Вход</h1>

      <div class="login__content">
        <div class="login__box">
          <i class="ri-user-3-line login__icon"></i>

          <div class="login__box-input">
            <input type="text" required class="login__input" id="login-email" name="username" placeholder=" "
              autocomplete="username" autocapitalize="off" spellcheck="false" />
            <label for="login-email" class="login__label">Логин</label>
          </div>
        </div>

        <div class="login__box">
          <i class="ri-lock-2-line login__icon"></i>

          <div class="login__box-input">
            <input type="password" required class="login__input" id="login-pass" name="password" placeholder=" "
              autocomplete="current-password" />
            <label for="login-pass" class="login__label">Пароль</label>
            <i class="ri-eye-off-line login__eye" id="login-eye"></i>
          </div>
        </div>
      </div>

      <div class="login__check">
        <div class="login__check-group">
          <input type="checkbox" class="login__check-input" id="login-check" name="remember_me" value="1" />
          <label for="login-check" class="login__check-label">Запомнить меня</label>
        </div>
      </div>
      <p class="login__check-hint">На этом устройстве до {{ remember_me_days }} дней.</p>

      <!-- Капча -->
      <div class="captcha-container hidden">
        <div class="captcha-wrapper">
          <input type="text" id="captcha-input" name="captcha" maxlength="6" placeholder=" " autocomplete="off" />
          <label class="captcha__label">Код</label>
        </div>
        <div class="captcha-image-group">
          <img src="/captcha.png" alt="Captcha" id="captcha-img" />
          <button type="button" id="refresh-captcha" aria-label="Обновить капчу">🔄</button>
        </div>
      </div>

      <button type="submit" class="login__button" id="login-submit">Войти</button>

      {% if telegram_login_enabled and telegram_bot_username %}
      <div class="login__check" style="margin-top: 0.8rem;">
        <div
          style="width: 100%; text-align: center; color: var(--theme-text-secondary, rgba(255,255,255,0.75)); font-size: 0.88rem;">
          или войдите через Telegram
        </div>
      </div>
      <div style="margin-top: 0.55rem; text-align: center;">
        <script async src="https://telegram.org/js/telegram-widget.js?22"
          data-telegram-login="{{ telegram_bot_username }}" data-size="large" data-radius="10"
          data-auth-url="{{ url_for('auth_telegram', _external=True) }}" data-request-access="write"></script>
      </div>
      {% endif %}
    </form>
  </div>

  {% if telegram_login_enabled and telegram_bot_username %}
  <script src="https://telegram.org/js/telegram-web-app.js?57"></script>
  <script>
    (function () {
      try {
        if (!window.Telegram || !window.Telegram.WebApp) {
          return;
        }

        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const initData = (tg.initData || "").trim();
        if (!initData) {
          return;
        }

        const onceKey = "tgMiniAutoAuthAttempted";
        if (window.sessionStorage && sessionStorage.getItem(onceKey) === "1") {
          return;
        }
        if (window.sessionStorage) {
          sessionStorage.setItem(onceKey, "1");
        }

        const nextUrl = "{{ (request.args.get('next') or url_for('tg_mini_app')) | e }}";
        const authUrl =
          "{{ url_for('auth_telegram_mini') }}" +
          "?next=" + encodeURIComponent(nextUrl) +
          "&init_data=" + encodeURIComponent(initData);

        window.location.replace(authUrl);
      } catch (_error) {
        // Оставляем обычную форму входа как fallback.
      }
    })();
  </script>
  {% endif %}

  <!--=============== MAIN JS ===============-->
  <script src="{{ url_for('static', filename='assets/js/main.js') }}"></script>
</body>

</html>
