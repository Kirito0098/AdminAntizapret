<div class="search-and-filter page-unified-toolbar">
  <div class="search-box">
    <input type="text" id="search-clients" placeholder="🔍 Поиск по имени клиента..." class="search-input">
    <button type="button" id="clear-search" class="clear-btn" title="Очистить поиск">✕</button>
  </div>
  {% if current_user and current_user.is_admin() %}
  <div class="filter-buttons">
    <button type="button" class="filter-btn" data-filter="all">Все</button>
    <button type="button" class="filter-btn" data-filter="active">✓ Активные</button>
    <button type="button" class="filter-btn" data-filter="expiring">⚠ Истекают скоро</button>
    <button type="button" class="filter-btn" data-filter="expired">✗ Истекшие</button>
  </div>
  {% endif %}
</div>
