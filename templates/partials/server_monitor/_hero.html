<section class="monitor-hero page-unified-card" aria-label="Центр мониторинга">
  <div class="monitor-hero-main">
    <p class="monitor-hero-kicker">Observability</p>
    <h1 class="monitor-hero-title">Мониторинг сервера</h1>
    <p class="monitor-hero-subtitle">CPU, память, диск и сетевой трафик в одном операционном контуре.</p>
  </div>
  <div class="monitor-hero__actions refresh-control page-unified-card page-unified-card--tight">
    <span id="monitorLiveBadge" class="monitor-live-badge" hidden aria-live="polite">Live</span>
    <button id="refreshBtn" class="refresh-btn" title="Обновить данные" type="button">
      <span class="refresh-icon">⟳</span>
      <span id="refreshText">Обновить сейчас</span>
    </button>
    <span id="lastUpdate" class="last-update">Последнее обновление: —</span>
  </div>
</section>
