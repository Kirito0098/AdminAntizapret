<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Mini App вход</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap");

        :root {
            --tg-open-bg-a: #171f24;
            --tg-open-bg-b: #12191d;
            --tg-open-panel-a: rgba(30, 39, 45, 0.92);
            --tg-open-panel-b: rgba(22, 30, 36, 0.95);
            --tg-open-border: rgba(166, 205, 220, 0.34);
            --tg-open-text: #eaf1f4;
            --tg-open-text-soft: #a7bac4;
            --tg-open-accent-a: #5a9dcb;
            --tg-open-accent-b: #3fa083;
            --tg-open-shadow: 0 18px 42px rgba(3, 8, 12, 0.38);
        }

        body {
            margin: 0;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 8% 0%, rgba(90, 157, 203, 0.2), transparent 36%),
                radial-gradient(circle at 92% 0%, rgba(63, 160, 131, 0.2), transparent 44%),
                linear-gradient(180deg, var(--tg-open-bg-a) 0%, var(--tg-open-bg-b) 100%);
            color: var(--tg-open-text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .card {
            max-width: 520px;
            width: 100%;
            border: 1px solid var(--tg-open-border);
            background:
                radial-gradient(circle at top right, rgba(88, 178, 163, 0.14), transparent 42%),
                linear-gradient(145deg, var(--tg-open-panel-a), var(--tg-open-panel-b));
            border-radius: 18px;
            padding: 18px;
            box-shadow: var(--tg-open-shadow);
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(90, 157, 203, 0.08), rgba(63, 160, 131, 0.03));
            pointer-events: none;
        }

        h2 {
            margin: 0 0 10px;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            font-size: 1.42rem;
            letter-spacing: 0.01em;
            position: relative;
            z-index: 1;
        }

        p {
            margin: 8px 0;
            position: relative;
            z-index: 1;
        }

        .muted {
            color: var(--tg-open-text-soft);
        }

        a {
            display: inline-block;
            margin-top: 10px;
            color: #fff;
            background: linear-gradient(145deg, var(--tg-open-accent-a), var(--tg-open-accent-b));
            border-radius: 12px;
            border: 1px solid rgba(190, 227, 239, 0.24);
            text-decoration: none;
            padding: 9px 14px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        #status {
            margin: 0 0 10px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(166, 205, 220, 0.3);
            background: rgba(90, 157, 203, 0.12);
            color: var(--tg-open-text);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            padding: 4px 9px;
            border-radius: 999px;
            border: 1px solid rgba(166, 205, 220, 0.34);
            background: rgba(63, 160, 131, 0.15);
            color: #dff8f1;
            font-size: 0.76rem;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .badge::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #58b2a3;
            box-shadow: 0 0 0 0 rgba(88, 178, 163, 0.35);
            animation: tgOpenPulse 1.4s infinite;
        }

        @keyframes tgOpenPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(88, 178, 163, 0.35);
            }

            70% {
                box-shadow: 0 0 0 7px rgba(88, 178, 163, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(88, 178, 163, 0);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Вход в Mini App</h2>
        <p id="status">Проверяем Telegram авторизацию...</p>
        <div class="badge">Secure mini-session</div>
        <p class="muted">Mini App доступен только из официального Telegram клиента.</p>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js?57"></script>
    <script>
        (function () {
            const status = document.getElementById("status");
            const targetUrl = "{{ url_for('tg_mini_app') }}";
            const csrfToken = "{{ csrf_token() | e }}";

            function setStatus(text) {
                if (status) {
                    status.textContent = text;
                }
            }

            try {
                if (!window.Telegram || !window.Telegram.WebApp) {
                    setStatus("Telegram WebApp API недоступен. Откройте Mini App через Telegram.");
                    return;
                }

                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();

                const initData = (tg.initData || "").trim();
                if (!initData) {
                    setStatus("Не получены initData от Telegram. Выполните вход вручную.");
                    return;
                }

                setStatus("Авторизация... перенаправляем");

                const form = document.createElement("form");
                form.method = "POST";
                form.action = "{{ url_for('auth_telegram_mini') }}";
                form.style.display = "none";

                const nextInput = document.createElement("input");
                nextInput.type = "hidden";
                nextInput.name = "next";
                nextInput.value = targetUrl;
                form.appendChild(nextInput);

                const initDataInput = document.createElement("input");
                initDataInput.type = "hidden";
                initDataInput.name = "init_data";
                initDataInput.value = initData;
                form.appendChild(initDataInput);

                const csrfInput = document.createElement("input");
                csrfInput.type = "hidden";
                csrfInput.name = "csrf_token";
                csrfInput.value = csrfToken;
                form.appendChild(csrfInput);

                document.body.appendChild(form);
                form.submit();
            } catch (_error) {
                setStatus("Ошибка запуска mini-авторизации. Откройте Mini App из Telegram.");
            }
        })();
    </script>
</body>

</html>
