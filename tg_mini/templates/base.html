<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/static/assets/img/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/theme.css') }}" />
  {% block extra_css %}{% endblock %}
  <title>{% block title %}Telegram Mini App{% endblock %}</title>
</head>

<body class="tg-mini-app index-page-dark">
  <main class="tg-mini-main">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>

</html>
